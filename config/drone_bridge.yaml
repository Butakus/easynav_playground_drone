# replace 3d lidar 
- ros_topic_name: "/lidar_3d/points"
  gz_topic_name: "/lidar_3d/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS
  lazy: false
